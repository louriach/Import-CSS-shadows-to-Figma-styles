<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 16px;
      color: #333;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 300px;
    }
    
    label {
      font-weight: 500;
      margin-bottom: 4px;
      display: block;
    }
    
    textarea {
      width: 100%;
      height: 80px;
      padding: 8px;
      border: 1px solid #E6E6E6;
      border-radius: 2px;
      font-family: monospace;
      resize: vertical;
    }
    
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #E6E6E6;
      border-radius: 2px;
    }
    
    button {
      background-color: #18A0FB;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    button:hover {
      background-color: #0D8DE3;
    }
    
    button:disabled {
      background-color: #CCCCCC;
      cursor: not-allowed;
    }
    
    .preview-box {
      width: 100px;
      height: 100px;
      background-color: white;
      border-radius: 4px;
      margin: 0 auto;
    }
    
    .error {
      color: #D92C2C;
      font-size: 12px;
      margin-top: 4px;
    }
    
    .section {
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="section">
      <label for="css-input">CSS Box Shadow</label>
      <textarea id="css-input" placeholder="e.g., 0px 4px 8px rgba(0, 0, 0, 0.1)"></textarea>
      <div id="error-message" class="error"></div>
    </div>
    
    <div class="section">
      <label>Preview</label>
      <div class="preview-box" id="preview"></div>
    </div>
    
    <div class="section">
      <label for="style-name">Style Name</label>
      <input type="text" id="style-name" placeholder="e.g., Small Shadow">
    </div>
    
    <button id="preview-btn">Preview Shadow</button>
    <button id="create-btn" disabled>Create Figma Style</button>
  </div>

  <script>
  // Get UI elements
  const cssInput = document.getElementById('css-input');
  const styleName = document.getElementById('style-name');
  const previewBtn = document.getElementById('preview-btn');
  const createBtn = document.getElementById('create-btn');
  const previewBox = document.getElementById('preview');
  const errorMessage = document.getElementById('error-message');
  
  // Preview button click handler
  previewBtn.onclick = () => {
    let cssValue = cssInput.value.trim();
    if (!cssValue) {
      errorMessage.textContent = 'Please enter a CSS box-shadow value';
      return;
    }
    
    try {
      // Clean up the CSS value for preview:
      // 1. Remove 'box-shadow:' prefix if present
      if (cssValue.toLowerCase().indexOf('box-shadow:') === 0) {
        cssValue = cssValue.substring('box-shadow:'.length).trim();
      }
      
      // 2. Remove trailing semicolon if present
      if (cssValue.endsWith(';')) {
        cssValue = cssValue.slice(0, -1).trim();
      }
      
      // Apply the shadow directly to the preview box
      previewBox.style.boxShadow = cssValue;
      errorMessage.textContent = '';
      
      // Send to the plugin code for validation (send the original value)
      parent.postMessage({ pluginMessage: { 
        type: 'preview-shadow',
        css: cssInput.value.trim()
      } }, '*');
      
      // Enable the create button
      createBtn.disabled = false;
    } catch (error) {
      errorMessage.textContent = 'Invalid box-shadow format';
      createBtn.disabled = true;
    }
  };
    
    // Create style button click handler
    createBtn.onclick = () => {
      const name = styleName.value.trim();
      if (!name) {
        errorMessage.textContent = 'Please enter a style name';
        return;
      }
      
      parent.postMessage({ pluginMessage: { 
        type: 'create-style',
        css: cssInput.value.trim(),
        name: name
      } }, '*');
    };
    
    // Listen for messages from the plugin code
    window.onmessage = (event) => {
      const message = event.data.pluginMessage;
      
      if (message.type === 'error') {
        errorMessage.textContent = message.message;
        // If there's an error, disable the create button
        createBtn.disabled = true;
      } else if (message.type === 'preview-success') {
        errorMessage.textContent = '';
        createBtn.disabled = false;
      } else if (message.type === 'success') {
        errorMessage.textContent = '';
        cssInput.value = '';
        styleName.value = '';
        createBtn.disabled = true;
        previewBox.style.boxShadow = 'none';
      }
    };
  </script>
</body>
</html>
